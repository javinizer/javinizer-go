name: Test & Coverage

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GO_VERSION_FILE: go.mod

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Fast unit tests and coverage
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Detect act environment
      id: detect
      run: |
        if [ -n "$ACT" ]; then
          echo "running_in_act=true" >> $GITHUB_OUTPUT
          echo "Running in act (local testing mode)"
        else
          echo "running_in_act=false" >> $GITHUB_OUTPUT
          echo "Running in GitHub Actions"
        fi

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: go test -v ./...

    - name: Generate coverage report
      run: make coverage

    - name: Check coverage threshold
      run: ./scripts/check_coverage.sh 75 coverage.out

    - name: Upload coverage to Codecov
      if: steps.detect.outputs.running_in_act != 'true'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-javinizer
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        verbose: true

    - name: Archive coverage report
      if: steps.detect.outputs.running_in_act != 'true'
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: coverage-report
        path: coverage.out
        retention-days: 30

    - name: Display coverage report (act only)
      if: steps.detect.outputs.running_in_act == 'true'
      run: |
        echo "Coverage report generated (skipped upload in act mode)"
        go tool cover -func=coverage.out | tail -20

  # Job 2: Race detector tests (concurrent code)
  race-tests:
    name: Race Detector Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Run race detector tests
      run: make test-race

  # Job 3: Linting and code quality
  lint:
    name: Linting & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Run go vet
      run: make vet

    - name: Check internal/api file size guardrail
      run: ./scripts/check_api_file_size.sh 700 internal/api

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
      with:
        # Go 1.26 in go.mod requires a golangci-lint binary built with Go 1.26+.
        # v2.9.0+ satisfies this; pin to avoid version skew.
        version: v2.9.0
        args: --timeout=5m

    - name: Check formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go code is not formatted:"
          gofmt -d .
          exit 1
        fi

  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

    - name: Run govulncheck
      run: govulncheck ./...

  # Job 4: Windows tests (catches Windows-specific path bugs)
  test-windows:
    name: Unit Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: go test -short ./...

  # Job 5: Frontend Tests
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci --prefix web/frontend

    - name: Run frontend tests
      run: npm run test --prefix web/frontend

  # Job 6: Build verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci --prefix web/frontend

    - name: Download dependencies
      run: go mod download

    - name: Build CLI
      run: make build

    - name: Install swag
      run: go install github.com/swaggo/swag/cmd/swag@v1.16.6

    - name: Generate Swagger documentation
      run: export PATH=$PATH:$(go env GOPATH)/bin && make swagger

    - name: Verify swagger files are up to date
      run: |
        if [ -n "$(git status docs/swagger/ --porcelain)" ]; then
          echo "⚠️  Swagger documentation is out of date"
          echo "Run 'make swagger' and commit the changes"
          echo ""
          git status docs/swagger/
          exit 1
        fi
      shell: bash

    - name: Verify mockery mocks are up to date
      run: make check-mocks
      shell: bash

    - name: Verify binary
      run: |
        if [ ! -f bin/javinizer ]; then
          echo "Binary not created"
          exit 1
        fi
        chmod +x bin/javinizer
        ./bin/javinizer --version || echo "Version check completed"

    - name: Verify embedded web UI
      shell: bash
      run: |
        set -euo pipefail
        ./bin/javinizer web --host 127.0.0.1 --port 18080 > /tmp/javinizer-web.log 2>&1 &
        pid=$!
        trap 'kill "${pid}" >/dev/null 2>&1 || true' EXIT

        for _ in $(seq 1 30); do
          if curl --silent --fail http://127.0.0.1:18080/health >/dev/null; then
            break
          fi
          sleep 1
        done

        homepage="$(curl --silent --fail -H 'Accept: text/html' http://127.0.0.1:18080/)"
        if printf '%s' "${homepage}" | grep -q 'Javinizer Web UI Placeholder'; then
          echo "Binary is serving the placeholder web UI instead of the bundled frontend"
          echo "Server log:"
          cat /tmp/javinizer-web.log
          exit 1
        fi

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Resolve version
      id: version
      run: |
        version="$(./scripts/version.sh)"
        if [ -z "$version" ]; then
          echo "Failed to resolve version"
          exit 1
        fi
        echo "value=$version" >> "$GITHUB_OUTPUT"

    - name: Resolve build date
      id: build_date
      run: echo "value=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
    - name: Build Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        load: true
        push: false
        tags: javinizer:test
        build-args: |
          VERSION=${{ steps.version.outputs.value }}
          COMMIT=${{ github.sha }}
          BUILD_DATE=${{ steps.build_date.outputs.value }}

    - name: Verify Docker metadata and version output
      run: |
        docker run --rm --entrypoint /usr/local/bin/javinizer javinizer:test version --short
        image_version="$(docker inspect javinizer:test --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')"
        if [ "$image_version" != "${{ steps.version.outputs.value }}" ]; then
          echo "Docker image label version mismatch: $image_version"
          exit 1
        fi

  # Job: Fullstack E2E — real browser → real SvelteKit frontend → real HTTP
  # transport → real Go API server (cmd/javinizer-e2e with the deterministic
  # e2emock scraper substituted at the scraper seam) → real worker pipeline →
  # real :memory: SQLite. Hermetic + deterministic: no real network scraping.
  # Playwright's webServer spawns both `go run ./cmd/javinizer-e2e` (on :18080)
  # and the Vite dev server (on :5175), killing both on teardown.
  # Gate merge: set this job as a required status check in branch protection.
  fullstack-e2e:
    name: Fullstack E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci --prefix web/frontend

    - name: Download Go dependencies
      run: go mod download

    - name: Install Playwright browsers
      working-directory: web/frontend
      run: npx playwright install --with-deps chromium

    - name: Run fullstack E2E suite
      run: make test-e2e-fullstack

    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: fullstack-e2e-artifacts
        path: |
          web/frontend/test-results/
          web/frontend/playwright-report/
        if-no-files-found: ignore
        retention-days: 30

  # Job: Frontend-only E2E — mocked API (page.route), NO backend. Fast +
  # deterministic: pins pure frontend rendering + interaction logic + env-gated
  # UI states (e.g. install_environment=desktop) that the fullstack CLI backend
  # can't produce. Spawns only the Vite dev server. One of three Playwright
  # distinctions: frontend-only (this), fullstack-e2e (real backend), and
  # local-only live scrapers (test/e2e/live, never in CI).
  frontend-e2e:
    name: Frontend-only E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci --prefix web/frontend

    - name: Install Playwright browsers
      working-directory: web/frontend
      run: npx playwright install --with-deps chromium

    - name: Run frontend-only E2E suite
      run: make test-e2e-frontend

    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: frontend-e2e-artifacts
        path: |
          web/frontend/test-results/
          web/frontend/playwright-report/
        if-no-files-found: ignore
        retention-days: 30

  # Job: CLI E2E — builds the real `javinizer` binary and drives its
  # subcommands (sort, version, --help, --dry-run) end-to-end via os/exec.
  # Hermetic + deterministic: JAVINIZER_E2E_SCRAPERS=true substitutes the
  # offline e2emock scraper at the dependency-injection seam, so no real
  # network scraping happens. This is the CLI counterpart to the fullstack
  # Playwright suite (which drives the API server).
  cli-e2e:
    name: CLI E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Download Go dependencies
      run: go mod download

    - name: Run CLI E2E suite
      run: make test-e2e-cli
