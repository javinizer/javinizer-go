name: CLI Binary Release

on:
  push:
    tags:
      - 'v*'
  schedule:
    # Midnight UTC daily
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      release_type:
        description: Release mode
        required: true
        type: choice
        default: snapshot
        options:
          - stable
          - prerelease
          - snapshot
      version:
        description: Optional version/tag (e.g. v1.2.3 or v1.2.3-rc.1)
        required: false
        type: string
      create_release:
        description: Create or update GitHub release
        required: true
        type: boolean
        default: true
      draft:
        description: Mark release as draft (manual runs only)
        required: true
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  BINARY_NAME: javinizer
  GO_VERSION_FILE: go.mod

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      docker_version: ${{ steps.meta.outputs.docker_version }}
      tracked_version: ${{ steps.meta.outputs.tracked_version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft: ${{ steps.meta.outputs.draft }}
      create_release: ${{ steps.meta.outputs.create_release }}
      build_date: ${{ steps.meta.outputs.build_date }}
      commit: ${{ steps.meta.outputs.commit }}
      publish_latest: ${{ steps.meta.outputs.publish_latest }}
      is_nightly: ${{ steps.meta.outputs.is_nightly }}
      nightly_should_run: ${{ steps.meta.outputs.nightly_should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          build_date="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          commit="${GITHUB_SHA}"
          tracked_version="$(./scripts/version.sh)"
          nightly_should_run="true"

          if [[ -z "${tracked_version}" ]]; then
            echo "Failed to resolve version" >&2
            exit 1
          fi

          if [[ "${event_name}" == "push" ]]; then
            version="${GITHUB_REF_NAME}"
            create_release="true"
            draft="false"
            publish_latest="true"
            is_nightly="false"
            if [[ "${version}" == *-* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
          elif [[ "${event_name}" == "schedule" ]]; then
            version="0.0.0-nightly.${commit::7}"

            create_release="false"
            draft="false"
            prerelease="true"
            publish_latest="false"
            is_nightly="true"

            since_ts="$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')"
            changed_files="$(git log --since="${since_ts}" --name-only --pretty=format: -- . | sed '/^$/d' | sort -u)"
            relevant_pattern='^(cmd/|internal/|web/|Dockerfile$|go\.mod$|go\.sum$|Makefile$|scripts/version\.sh$|\.github/workflows/cli-release\.yml$)'

            if [[ -z "${changed_files}" ]]; then
              nightly_should_run="false"
              echo "No repository changes detected in the last 24h; skipping nightly build."
            elif ! printf '%s\n' "${changed_files}" | grep -Eq "${relevant_pattern}"; then
              nightly_should_run="false"
              echo "No release-impacting changes detected in the last 24h; skipping nightly build."
            fi
          elif [[ "${event_name}" == "workflow_dispatch" ]]; then
            release_type="${{ inputs.release_type }}"
            input_version="${{ inputs.version }}"
            create_release="${{ inputs.create_release }}"
            draft="${{ inputs.draft }}"
            is_nightly="false"

            if [[ "${release_type}" == "snapshot" && -z "${input_version}" ]]; then
              version="0.0.0-nightly.${commit::7}"
              prerelease="true"
              publish_latest="false"
              is_nightly="true"
            else
              case "${release_type}" in
                stable)
                  if [[ -z "${input_version}" ]]; then
                    echo "Stable releases require a version like v1.2.3" >&2
                    exit 1
                  fi
                  version="${input_version}"
                  prerelease="false"
                  publish_latest="true"
                  ;;
                prerelease)
                  if [[ -z "${input_version}" ]]; then
                    echo "Pre-releases require a version like v1.2.3-rc.1" >&2
                    exit 1
                  fi
                  version="${input_version}"
                  prerelease="true"
                  publish_latest="true"
                  ;;
                snapshot)
                  version="${input_version}"
                  prerelease="true"
                  publish_latest="false"
                  ;;
                *)
                  echo "Unknown release type: ${release_type}" >&2
                  exit 1
                  ;;
              esac

              if [[ "${release_type}" == "stable" && "${version}" == *-* ]]; then
                echo "Stable release version must not include prerelease suffix: ${version}" >&2
                exit 1
              fi
            fi
          fi

          if [[ "${is_nightly}" == "true" ]]; then
            if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-nightly\.[0-9a-f]{7}$ ]]; then
              echo "Nightly version does not match expected format: ${version}" >&2
              exit 1
            fi
          else
            if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
              echo "Version does not match expected format: ${version}" >&2
              exit 1
            fi
          fi

          if [[ "${event_name}" == "push" || "${release_type:-snapshot}" != "snapshot" ]]; then
            if [[ "${tracked_version}" != "${version}" ]]; then
              echo "Tracked version (${tracked_version}) does not match requested release version (${version})" >&2
              exit 1
            fi
          fi

          release_name="Javinizer ${version}"
          if [[ "${prerelease}" == "true" ]]; then
            release_name="${release_name} (Pre-release)"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "docker_version=${version}" >> "$GITHUB_OUTPUT"
          echo "tracked_version=${tracked_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${version}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "draft=${draft}" >> "$GITHUB_OUTPUT"
          echo "create_release=${create_release}" >> "$GITHUB_OUTPUT"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"
          echo "commit=${commit}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${publish_latest}" >> "$GITHUB_OUTPUT"
          echo "is_nightly=${is_nightly}" >> "$GITHUB_OUTPUT"
          echo "nightly_should_run=${nightly_should_run}" >> "$GITHUB_OUTPUT"

          echo "Resolved metadata:"
          echo "  version=${version}"
          echo "  prerelease=${prerelease}"
          echo "  draft=${draft}"
          echo "  create_release=${create_release}"
          echo "  publish_latest=${publish_latest}"
          echo "  is_nightly=${is_nightly}"
          echo "  nightly_should_run=${nightly_should_run}"

  build-web-assets:
    name: Build web assets
    needs: prepare-release
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.nightly_should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci --prefix web/frontend

      - name: Build frontend bundle
        run: |
          npm run build --prefix web/frontend
          rm -rf web/dist
          mkdir -p web/dist
          cp -R web/frontend/build/. web/dist/

      - name: Upload web assets
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  build-linux:
    name: Build ${{ matrix.id }}
    needs: [prepare-release, build-web-assets]
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.nightly_should_run == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_suffix: linux-amd64
            build_deps: build-essential
            cc: ''
          - id: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_suffix: linux-arm64
            build_deps: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: Download web assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: web-dist
          path: .artifacts/web-dist

      - name: Restore web assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf web/dist
          mkdir -p web/dist
          cp -R .artifacts/web-dist/. web/dist/

      - name: Verify embedded web bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f web/dist/index.html
          test -d web/dist/_app
          if grep -q "Javinizer Web UI Placeholder" web/dist/index.html; then
            echo "Placeholder web bundle detected in release build input"
            exit 1
          fi

      - name: Install build dependencies
        if: runner.os == 'Linux' && matrix.build_deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.build_deps }}

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          COMMIT: ${{ needs.prepare-release.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare-release.outputs.build_date }}
        run: |
          set -euo pipefail
          mkdir -p dist
          output="${{ env.BINARY_NAME }}-${{ matrix.artifact_suffix }}"

          go build -trimpath -ldflags="-w -s \
            -X github.com/javinizer/javinizer-go/internal/version.Version=${VERSION} \
            -X github.com/javinizer/javinizer-go/internal/version.Commit=${COMMIT} \
            -X github.com/javinizer/javinizer-go/internal/version.BuildDate=${BUILD_DATE}" \
            -o "dist/${output}" ./cmd/javinizer

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.id }}
          path: dist/*

  build-darwin:
    name: Build darwin binaries
    needs: [prepare-release, build-web-assets]
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.nightly_should_run == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: Download web assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: web-dist
          path: .artifacts/web-dist

      - name: Restore web assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf web/dist
          mkdir -p web/dist
          cp -R .artifacts/web-dist/. web/dist/

      - name: Verify embedded web bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f web/dist/index.html
          test -d web/dist/_app
          if grep -q "Javinizer Web UI Placeholder" web/dist/index.html; then
            echo "Placeholder web bundle detected in release build input"
            exit 1
          fi

      - name: Build AMD64 and ARM64 binaries
        shell: bash
        env:
          CGO_ENABLED: '1'
          VERSION: ${{ needs.prepare-release.outputs.version }}
          COMMIT: ${{ needs.prepare-release.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare-release.outputs.build_date }}
        run: |
          set -euo pipefail
          mkdir -p dist

          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-w -s \
            -X github.com/javinizer/javinizer-go/internal/version.Version=${VERSION} \
            -X github.com/javinizer/javinizer-go/internal/version.Commit=${COMMIT} \
            -X github.com/javinizer/javinizer-go/internal/version.BuildDate=${BUILD_DATE}" \
            -o "dist/${{ env.BINARY_NAME }}-darwin-amd64" ./cmd/javinizer

          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-w -s \
            -X github.com/javinizer/javinizer-go/internal/version.Version=${VERSION} \
            -X github.com/javinizer/javinizer-go/internal/version.Commit=${COMMIT} \
            -X github.com/javinizer/javinizer-go/internal/version.BuildDate=${BUILD_DATE}" \
            -o "dist/${{ env.BINARY_NAME }}-darwin-arm64" ./cmd/javinizer

      - name: Create universal binary
        shell: bash
        run: |
          set -euo pipefail
          lipo -create \
            "dist/${{ env.BINARY_NAME }}-darwin-amd64" \
            "dist/${{ env.BINARY_NAME }}-darwin-arm64" \
            -output "dist/${{ env.BINARY_NAME }}-darwin-universal"

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: darwin
          path: dist/*

  build-windows-amd64:
    name: Build windows-amd64
    needs: [prepare-release, build-web-assets]
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.nightly_should_run == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: Download web assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: web-dist
          path: .artifacts/web-dist

      - name: Restore web assets
        shell: pwsh
        run: |
          if (Test-Path web/dist) {
            Remove-Item web/dist -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path web/dist | Out-Null
          Copy-Item .artifacts/web-dist/* web/dist -Recurse -Force

      - name: Verify embedded web bundle
        shell: pwsh
        run: |
          if (-not (Test-Path web/dist/index.html)) {
            throw "web/dist/index.html is missing"
          }
          if (-not (Test-Path web/dist/_app)) {
            throw "web/dist/_app is missing"
          }
          if (Select-String -Path web/dist/index.html -Pattern 'Javinizer Web UI Placeholder' -Quiet) {
            throw "Placeholder web bundle detected in release build input"
          }

      - name: Build binary
        shell: pwsh
        env:
          CGO_ENABLED: '1'
          GOOS: windows
          GOARCH: amd64
          VERSION: ${{ needs.prepare-release.outputs.version }}
          COMMIT: ${{ needs.prepare-release.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare-release.outputs.build_date }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $output = "${{ env.BINARY_NAME }}-windows-amd64.exe"
          go build -trimpath -ldflags "-w -s -X github.com/javinizer/javinizer-go/internal/version.Version=$env:VERSION -X github.com/javinizer/javinizer-go/internal/version.Commit=$env:COMMIT -X github.com/javinizer/javinizer-go/internal/version.BuildDate=$env:BUILD_DATE" -o "dist/$output" ./cmd/javinizer

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: windows-amd64
          path: dist/*

  build-desktop-darwin:
    name: Build desktop app (macOS)
    needs: [prepare-release, build-web-assets]
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.nightly_should_run == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: Download web assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: web-dist
          path: .artifacts/web-dist

      - name: Restore web assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf web/dist
          mkdir -p web/dist
          cp -R .artifacts/web-dist/. web/dist/

      - name: Verify embedded web bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f web/dist/index.html
          test -d web/dist/_app
          if grep -q "Javinizer Web UI Placeholder" web/dist/index.html; then
            echo "Placeholder web bundle detected in release build input"
            exit 1
          fi

      - name: Build AMD64 and ARM64 desktop binaries
        shell: bash
        env:
          CGO_ENABLED: '1'
          CGO_LDFLAGS: '-framework UniformTypeIdentifiers'
          VERSION: ${{ needs.prepare-release.outputs.version }}
          COMMIT: ${{ needs.prepare-release.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare-release.outputs.build_date }}
        run: |
          set -euo pipefail
          mkdir -p dist

          # -tags desktop,production: `desktop` pulls in the Wails runner
          # (internal/desktop/app.go); `production` is required by Wails to
          # enable its real frontend (the default build returns an error).
          # -X .../internal/desktop.BuildDesktop=1 makes a no-arg launch open
          # the GUI instead of printing help.
          for arch in amd64 arm64; do
            GOOS=darwin GOARCH="${arch}" go build -trimpath -tags 'desktop,production' \
              -ldflags="-w -s \
                -X github.com/javinizer/javinizer-go/internal/version.Version=${VERSION} \
                -X github.com/javinizer/javinizer-go/internal/version.Commit=${COMMIT} \
                -X github.com/javinizer/javinizer-go/internal/version.BuildDate=${BUILD_DATE} \
                -X github.com/javinizer/javinizer-go/internal/desktop.BuildDesktop=1" \
              -o "dist/javinizer-app-darwin-${arch}" ./cmd/javinizer
          done

      - name: Create universal binary
        shell: bash
        run: |
          set -euo pipefail
          lipo -create dist/javinizer-app-darwin-amd64 dist/javinizer-app-darwin-arm64 \
            -output dist/javinizer-app-darwin-universal
          # Per-arch intermediates are no longer needed once the universal exists.
          rm -f dist/javinizer-app-darwin-amd64 dist/javinizer-app-darwin-arm64

      - name: Package .app bundle
        shell: bash
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          ./scripts/package-app-darwin.sh dist/javinizer-app-darwin-universal dist/Javinizer.app "${VERSION}" internal/desktop/icons/javinizer.icns
          # Release assets must be flat files; zip the .app bundle.
          # The .app bundle inside stays "Javinizer.app" (what the cask's
          # `app "Javinizer.app"` installs); only the release asset filename
          # uses the javinizer-desktop-* scheme to distinguish it from CLI
          # binaries on the releases page.
          cd dist && ditto -c -k --keepParent Javinizer.app javinizer-desktop-macos-universal.zip
          rm -rf Javinizer.app javinizer-app-darwin-universal

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: desktop-darwin
          path: dist/*

  build-desktop-windows:
    name: Build desktop app (Windows)
    needs: [prepare-release, build-web-assets]
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.nightly_should_run == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: Download web assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: web-dist
          path: .artifacts/web-dist

      - name: Restore web assets
        shell: pwsh
        run: |
          if (Test-Path web/dist) {
            Remove-Item web/dist -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path web/dist | Out-Null
          Copy-Item .artifacts/web-dist/* web/dist -Recurse -Force

      - name: Verify embedded web bundle
        shell: pwsh
        run: |
          if (-not (Test-Path web/dist/index.html)) {
            throw "web/dist/index.html is missing"
          }
          if (-not (Test-Path web/dist/_app)) {
            throw "web/dist/_app is missing"
          }
          if (Select-String -Path web/dist/index.html -Pattern 'Javinizer Web UI Placeholder' -Quiet) {
            throw "Placeholder web bundle detected in release build input"
          }

      - name: Embed Windows icon
        shell: pwsh
        run: |
          # Generate a .syso COFF resource from the .ico so `go build`
          # embeds it into the .exe. genicon (internal/desktop/icons/genicon)
          # embeds the icon as RT_GROUP_ICON at resource ID 3 — the ID Wails'
          # window manager loads (AppIconID = 3), so both the .exe/taskbar
          # icon and the in-app window title-bar icon resolve. rsrc -ico
          # assigns ID 1, which leaves the window icon generic.
          # The .syso must live in the main package dir (cmd/javinizer).
          go run ./internal/desktop/icons/genicon `
            -ico internal/desktop/icons/javinizer.ico `
            -o cmd/javinizer/javinizer.syso -arch amd64

      - name: Build desktop binary
        shell: pwsh
        env:
          CGO_ENABLED: '1'
          GOOS: windows
          GOARCH: amd64
          VERSION: ${{ needs.prepare-release.outputs.version }}
          COMMIT: ${{ needs.prepare-release.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare-release.outputs.build_date }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # See build-desktop-darwin for the tags/ldflags rationale.
          go build -trimpath -tags 'desktop,production' -ldflags "-w -s -H windowsgui -X github.com/javinizer/javinizer-go/internal/version.Version=$env:VERSION -X github.com/javinizer/javinizer-go/internal/version.Commit=$env:COMMIT -X github.com/javinizer/javinizer-go/internal/version.BuildDate=$env:BUILD_DATE -X github.com/javinizer/javinizer-go/internal/desktop.BuildDesktop=1" -o "dist/javinizer-desktop-windows-amd64.exe" ./cmd/javinizer

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: desktop-windows
          path: dist/*

  build-desktop-linux:
    name: Build desktop app (Linux, ${{ matrix.arch }})
    needs: [prepare-release, build-web-assets]
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.nightly_should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners per arch: CGO + pkg-config against webkit2gtk
          # needs native libs, and linuxdeploy/appimagetool are themselves
          # arch-specific (no cross-compile).
          - arch: amd64
            runner: ubuntu-latest
            goarch: amd64
            appimage_arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            goarch: arm64
            appimage_arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: Install webkit2gtk + gtk3 dev dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Download web assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: web-dist
          path: .artifacts/web-dist

      - name: Restore web assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf web/dist
          mkdir -p web/dist
          cp -R .artifacts/web-dist/. web/dist/

      - name: Verify embedded web bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f web/dist/index.html
          test -d web/dist/_app
          if grep -q "Javinizer Web UI Placeholder" web/dist/index.html; then
            echo "Placeholder web bundle detected in release build input"
            exit 1
          fi

      - name: Build desktop binary
        shell: bash
        env:
          CGO_ENABLED: '1'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          COMMIT: ${{ needs.prepare-release.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare-release.outputs.build_date }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # webkit2_41 selects libwebkit2gtk-4.1 (Ubuntu 24.04's version).
          # See build-desktop-darwin for the desktop/production tags rationale.
          go build -trimpath -tags 'desktop,production,webkit2_41' -ldflags="-w -s \
            -X github.com/javinizer/javinizer-go/internal/version.Version=${VERSION} \
            -X github.com/javinizer/javinizer-go/internal/version.Commit=${COMMIT} \
            -X github.com/javinizer/javinizer-go/internal/version.BuildDate=${BUILD_DATE} \
            -X github.com/javinizer/javinizer-go/internal/desktop.BuildDesktop=1" \
            -o "dist/javinizer-app-linux-${{ matrix.arch }}" ./cmd/javinizer

      - name: Build AppImage
        shell: bash
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          ./scripts/package-app-linux.sh "dist/javinizer-app-linux-${{ matrix.arch }}" \
            "dist/javinizer-desktop-linux-${{ matrix.appimage_arch }}.AppImage" "${VERSION}" internal/desktop/icons/javinizer.png
          rm -f "dist/javinizer-app-linux-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: desktop-linux-${{ matrix.arch }}
          path: dist/*

  build-docker:
    name: Build Docker image (${{ matrix.platform }})
    needs: prepare-release
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.nightly_should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: needs.prepare-release.outputs.create_release == 'true' || needs.prepare-release.outputs.is_nightly == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (optionally) push single-arch image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ needs.prepare-release.outputs.create_release == 'true' || needs.prepare-release.outputs.is_nightly == 'true' }}
          tags: ${{ steps.image.outputs.name }}:${{ needs.prepare-release.outputs.docker_version }}-${{ matrix.suffix }}
          build-args: |
            VERSION=${{ needs.prepare-release.outputs.version }}
            COMMIT=${{ needs.prepare-release.outputs.commit }}
            BUILD_DATE=${{ needs.prepare-release.outputs.build_date }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max

  merge-manifest:
    name: Merge multi-arch manifest (GHCR)
    needs: [prepare-release, build-docker]
    if: |
      (github.event_name != 'schedule' || needs.prepare-release.outputs.nightly_should_run == 'true') &&
      (needs.prepare-release.outputs.create_release == 'true' || needs.prepare-release.outputs.is_nightly == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Normalize image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Derive stable semver tags
        id: semver
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.prepare-release.outputs.version }}'
          core="${version#v}"
          major=""
          minor=""

          if [[ "${version}" != *-* ]]; then
            IFS='.' read -r major minor _ <<< "${core}"
          fi

          echo "major=${major}" >> "$GITHUB_OUTPUT"
          echo "minor=${minor}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Assemble multi-arch manifest tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          img="${{ steps.image.outputs.name }}"
          ver="${{ needs.prepare-release.outputs.docker_version }}"
          publish_latest="${{ needs.prepare-release.outputs.publish_latest }}"
          is_nightly="${{ needs.prepare-release.outputs.is_nightly }}"
          commit="${{ needs.prepare-release.outputs.commit }}"
          major="${{ steps.semver.outputs.major }}"
          minor="${{ steps.semver.outputs.minor }}"
          prerelease="${{ needs.prepare-release.outputs.prerelease }}"

          tags=("${ver}")
          [[ "${publish_latest}" == "true" ]] && tags+=("latest")
          [[ "${is_nightly}" == "true" ]] && tags+=("nightly" "nightly-${commit}")
          if [[ "${prerelease}" != "true" && -n "${major}" ]]; then
            tags+=("v${major}")
            [[ -n "${minor}" ]] && tags+=("v${major}.${minor}")
          fi

          args=""
          for t in "${tags[@]}"; do args+=" -t ${img}:${t}"; done
          echo "args=${args}" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${tags[@]}" > /tmp/tags.txt

      - name: Merge per-arch images into multi-arch manifest
        run: |
          set -euo pipefail
          img="${{ steps.image.outputs.name }}"
          ver="${{ needs.prepare-release.outputs.docker_version }}"
          docker buildx imagetools create \
            ${{ steps.tags.outputs.args }} \
            "${img}:${ver}-amd64" \
            "${img}:${ver}-arm64"

      - name: Verify manifest
        run: |
          set -euo pipefail
          img="${{ steps.image.outputs.name }}"
          ver="${{ needs.prepare-release.outputs.docker_version }}"
          echo "=== ${img}:${ver} manifest ==="
          docker buildx imagetools inspect "${img}:${ver}"

  create-release:
    name: Create GitHub release
    needs: [prepare-release, build-linux, build-darwin, build-windows-amd64, build-desktop-darwin, build-desktop-windows, build-desktop-linux, merge-manifest]
    if: needs.prepare-release.outputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Extract changelog notes for version
        id: changelog
        shell: bash
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -uo pipefail
          
          # Extract the section for this version from CHANGELOG.md
          # Format: ## [vX.Y.Z] - YYYY-MM-DD ... until next ## [
          
          changelog_file="CHANGELOG.md"
          notes_file="/tmp/release_notes.md"
          delimiter="EOF_$(date +%s)_$$"
          
          if [[ ! -f "${changelog_file}" ]]; then
            echo "CHANGELOG.md not found, falling back to auto-generated notes"
            echo "notes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          if [[ ! -r "${changelog_file}" ]]; then
            echo "::error::CHANGELOG.md exists but is not readable"
            exit 1
          fi
          
          # Find the line number where this version starts (fixed-string match)
          # Capture both output and exit status to distinguish "no match" from errors
          set +o pipefail
          grep_output=$(grep -Fn -- "## [${VERSION}]" "${changelog_file}" 2>&1) || grep_status=$?
          set -o pipefail
          
          if [[ -n "${grep_status:-}" && "${grep_status}" -ne 1 ]]; then
            # grep exit 1 = no match (expected); other codes = error
            echo "::error::grep failed on CHANGELOG.md: ${grep_output}"
            exit 1
          fi
          
          start_line=$(echo "${grep_output}" | head -1 | cut -d: -f1)
          
          if [[ -z "${start_line}" ]]; then
            echo "Version ${VERSION} not found in CHANGELOG.md, falling back to auto-generated notes"
            echo "notes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Find the line number where the next version section starts
          set +o pipefail
          next_output=$(tail -n +"$((start_line + 1))" "${changelog_file}" | grep -Fn "## [" 2>&1) || next_status=$?
          set -o pipefail
          
          if [[ -n "${next_status:-}" && "${next_status}" -ne 1 ]]; then
            echo "::error::Failed to find next version section: ${next_output}"
            exit 1
          fi
          
          next_line=$(echo "${next_output}" | head -1 | cut -d: -f1)
          
          if [[ -z "${next_line}" ]]; then
            # No next section, extract to end of file
            tail -n +"${start_line}" "${changelog_file}" > "${notes_file}"
          else
            # Extract from start_line to next_line (exclusive)
            total_lines=$((start_line + next_line - 1))
            head -n "${total_lines}" "${changelog_file}" | tail -n +"${start_line}" > "${notes_file}"
          fi
          
          echo "Extracted release notes:"
          cat "${notes_file}"
          echo ""
          
          # Store the path for the release action
          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"
          
          # Set multiline output for GitHub Actions with unique delimiter
          {
            echo "notes<<${delimiter}"
            cat "${notes_file}"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Download linux-amd64 artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: linux-amd64
          path: ./artifacts/linux-amd64

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: linux-arm64
          path: ./artifacts/linux-arm64

      - name: Download darwin artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: darwin
          path: ./artifacts/darwin

      - name: Download windows-amd64 artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: windows-amd64
          path: ./artifacts/windows-amd64

      - name: Download desktop-darwin artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: desktop-darwin
          path: ./artifacts/desktop-darwin

      - name: Download desktop-windows artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: desktop-windows
          path: ./artifacts/desktop-windows

      - name: Download desktop-linux-amd64 artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: desktop-linux-amd64
          path: ./artifacts/desktop-linux-amd64

      - name: Download desktop-linux-arm64 artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: desktop-linux-arm64
          path: ./artifacts/desktop-linux-arm64

      - name: Consolidate release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./release
          find ./artifacts -type f -exec cp {} ./release/ \;
          ls -lh ./release/

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd ./release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-bundle-${{ needs.prepare-release.outputs.version }}
          path: ./release/*

      - name: Publish GitHub release
        if: needs.prepare-release.outputs.create_release == 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: ./release/*
          generate_release_notes: ${{ steps.changelog.outputs.notes == '' }}
          draft: ${{ needs.prepare-release.outputs.draft == 'true' }}
          prerelease: ${{ needs.prepare-release.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.prepare-release.outputs.prerelease != 'true' }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: [prepare-release, create-release]
    # Only update the tap for stable releases. Prereleases (v1.0.0-rc.*) never
    # reach the tap, so `brew upgrade` never hands a user a release candidate.
    # Also skip nightlies/snapshots (create_release == 'false').
    if: needs.prepare-release.outputs.create_release == 'true' && needs.prepare-release.outputs.prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout javinizer-go (formula template + render script)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download release bundle (checksums.txt)
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-bundle-${{ needs.prepare-release.outputs.version }}
          path: ./release

      - name: Render formula
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p out
          ./scripts/homebrew/render-formula.sh "$VERSION" ./release/checksums.txt scripts/homebrew/javinizer.rb.tmpl > out/javinizer.rb
          ./scripts/homebrew/render-formula.sh "$VERSION" ./release/checksums.txt scripts/homebrew/javinizer-app.cask.tmpl > out/javinizer-app.rb
          echo "=== rendered Formula/javinizer.rb ==="
          cat out/javinizer.rb
          echo "=== rendered Casks/javinizer-app.rb ==="
          cat out/javinizer-app.rb

      - name: Checkout tap repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: javinizer/homebrew-tap
          path: tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: Commit formula to tap
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula tap/Casks
          cp out/javinizer.rb tap/Formula/javinizer.rb
          cp out/javinizer-app.rb tap/Casks/javinizer-app.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/javinizer.rb Casks/javinizer-app.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
          else
            git commit -m "brew: javinizer ${VERSION}"
            git push
          fi

  update-scoop-bucket:
    name: Update Scoop bucket
    needs: [prepare-release, create-release]
    # Only update the bucket for stable releases. Prereleases (v1.0.0-rc.*) never
    # reach the bucket, so `scoop update` never hands a user a release candidate.
    # Also skip nightlies/snapshots (create_release == 'false').
    if: needs.prepare-release.outputs.create_release == 'true' && needs.prepare-release.outputs.prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout javinizer-go (manifest template + render script)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download release bundle (checksums.txt)
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-bundle-${{ needs.prepare-release.outputs.version }}
          path: ./release

      - name: Render manifest
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p out
          ./scripts/scoop/render-manifest.sh "$VERSION" ./release/checksums.txt scripts/scoop/javinizer.json.tmpl > out/javinizer.json
          ./scripts/scoop/render-manifest.sh "$VERSION" ./release/checksums.txt scripts/scoop/javinizer-app.json.tmpl > out/javinizer-app.json
          echo "=== rendered bucket/javinizer.json ==="
          cat out/javinizer.json
          echo "=== rendered bucket/javinizer-app.json ==="
          cat out/javinizer-app.json

      - name: Checkout bucket repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: javinizer/scoop-javinizer
          path: bucket-repo
          ssh-key: ${{ secrets.SCOOP_BUCKET_DEPLOY_KEY }}

      - name: Commit manifest to bucket
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p bucket-repo/bucket
          cp out/javinizer.json bucket-repo/bucket/javinizer.json
          cp out/javinizer-app.json bucket-repo/bucket/javinizer-app.json
          cd bucket-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/javinizer.json bucket/javinizer-app.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "scoop: javinizer ${VERSION}"
            git push
          fi

  notify-discord:
    name: Notify Discord
    needs: [prepare-release, create-release]
    # Notify on every published release (stable + prerelease); skip drafts
    # and non-release runs (snapshots/nightlies where create_release == 'false').
    #
    # NOTE: This lives in cli-release.yml rather than a separate
    # release-event-triggered workflow because the release above is published
    # with GITHUB_TOKEN, and events triggered by GITHUB_TOKEN do not spawn
    # downstream workflow runs (GitHub anti-loop protection). Running in the
    # same workflow avoids that limitation entirely.
    if: needs.prepare-release.outputs.create_release == 'true' && needs.prepare-release.outputs.draft != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post release to Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ needs.prepare-release.outputs.tag_name }}
          NAME: ${{ needs.prepare-release.outputs.release_name }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set; skipping"
            exit 0
          fi

          url="https://github.com/${REPO}/releases/tag/${TAG}"

          # Fetch the published release so we can mirror its body, author,
          # and publish timestamp in the Discord embed.
          release_json="$(gh api "repos/${REPO}/releases/tags/${TAG}" 2>/dev/null || echo '{}')"
          body="$(printf '%s' "${release_json}" | jq -r '.body // "")"
          author_login="$(printf '%s' "${release_json}" | jq -r '.author.login // "")"
          author_avatar="$(printf '%s' "${release_json}" | jq -r '.author.avatar_url // "")"
          published_at="$(printf '%s' "${release_json}" | jq -r '.published_at // (now | todate)')"

          # Truncate the release notes so the embed stays compact. Discord
          # caps the description at 4096 chars, but a full changelog makes
          # the card unwieldy; show the first 500 characters and link out for
          # the rest. jq's slice (.[0:500]) operates on Unicode codepoints, so
          # multibyte UTF-8 sequences are never split mid-character (head -c
          # would truncate by byte and could emit invalid UTF-8).
          body_excerpt="$(printf '%s' "${body}" | jq -rR '.[0:500]')"
          body_len="$(printf '%s' "${body}" | jq -rR 'length')"
          if [ "${body_len}" -gt 500 ]; then
            body_preview="${body_excerpt}
            
            … *[read full release notes](${url})*"
          else
            body_preview="${body_excerpt}"
          fi
          title="${NAME:-${TAG}}"
          title="$(printf '%s' "${title}" | head -c 250)"

          if [ "${PRERELEASE}" = "true" ]; then
            color="15844367" # orange — prerelease
            type_label="Pre-release"
          else
            color="32768"   # green — stable
            type_label="Release"
          fi

          # GitHub renders a per-repo Open Graph social card (repo name,
          # description, stars). Using it as the embed thumbnail gives the
          # bot post a rich preview comparable to Discord's auto link embed.
          thumbnail="https://opengraph.githubassets.com/1/${REPO}"
          repo_url="https://github.com/${REPO}"

          payload="$(jq -n \
            --arg title "${title}" \
            --arg tag "${TAG}" \
            --arg url "${url}" \
            --arg type "${type_label}" \
            --arg color "${color}" \
            --arg body "${body_preview}" \
            --arg repo "${REPO}" \
            --arg repo_url "${repo_url}" \
            --arg thumbnail "${thumbnail}" \
            --arg author "${author_login}" \
            --arg author_avatar "${author_avatar}" \
            --arg published_at "${published_at}" \
            --argjson has_body "$([ -n "${body_preview}" ] && echo true || echo false)" \
            --argjson has_author "$([ -n "${author_login}" ] && echo true || echo false)" \
            '{
              content: ("New " + $type + " published: [" + $tag + "](" + $url + ")"),
              embeds: [{
                title: $title,
                url: $url,
                color: ($color | tonumber),
                description: (if $has_body then $body else "*(no release notes)*" end),
                thumbnail: { url: $thumbnail },
                fields: [
                  { name: "Version", value: ("`" + $tag + "`"), inline: true },
                  { name: "Type", value: $type, inline: true },
                  { name: "Repository", value: ("[" + $repo + "](" + $repo_url + ")"), inline: true },
                  { name: "Download", value: ("[Release assets](" + $url + ")"), inline: true }
                ],
                author: (if $has_author then { name: $author, url: ("https://github.com/" + $author), icon_url: $author_avatar } else null end),
                footer: { text: $repo },
                timestamp: $published_at
              }]
            }')"

          echo "Posting release ${TAG} to Discord..."
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${DISCORD_WEBHOOK_URL}"

          echo "Discord notification sent for ${TAG}"
