version: "2"

run:
  tests: false

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - errname
    - errorlint
    - goconst
    - gosec
    - misspell
    - nilerr
    - noctx
    - unconvert
    - unparam
    - revive
  settings:
    goconst:
      min-len: 3
      min-occurrences: 4
    gosec:
      excludes:
        - G104
    revive:
      rules:
        - name: blank-imports
          disabled: true
        - name: context-as-argument
          disabled: true
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: increment-decrement
          disabled: true
        - name: var-naming
          disabled: true
        - name: package-comments
          disabled: true
        - name: receiver-naming
          disabled: true
        - name: time-naming
        - name: unexported-return
          disabled: true
        - name: indent-error-flow
          disabled: true
        - name: errorf
        - name: unnecessary-stmt
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: redefines-builtin-id
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
      - linters:
          - errorlint
        text: "non-wrapping format verb for fmt.Errorf"
      - linters:
          - errorlint
        text: "comparing with == will fail on wrapped errors"
      - linters:
          - errorlint
        text: "type assertion on error will fail on wrapped errors"
      - linters:
          - gosec
        text: "G115:"
      - linters:
          - gosec
        text: "G304:"
      - linters:
          - gosec
        text: "G306:"
      - linters:
          - gosec
        text: "G703:"
      - linters:
          - gosec
        text: "G118:"
      - path: internal/config/translation_config\.go
        linters:
          - goconst
      - path: internal/config/storage\.go
        linters:
          - goconst
      - path: internal/config/scrapers_config\.go
        linters:
          - goconst
      - path: internal/database/actress_merge\.go
        linters:
          - goconst
      - path: internal/tui/update\.go
        linters:
          - goconst
      - path: internal/api/server/server\.go
        linters:
          - goconst
      - path: internal/scraper/caribbeancom/caribbeancom\.go
        linters:
          - goconst
          - unparam
      - path: internal/scraper/javdb/javdb\.go
        linters:
          - goconst
      - path: internal/api/batch/process_preview_helpers\.go
        linters:
          - goconst
      - path: internal/api/core/path_validation\.go
