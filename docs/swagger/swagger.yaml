        type: string
      error:
        description: Error message if any
        type: string
      install_environment:
        description: |-
          InstallEnvironment reports how javinizer is running ("docker", "desktop",
          or "cli") so the UI can render the right upgrade path: docker images can't
          self-swap (read-only image), desktop apps need a new bundle, only cli
          builds self-upgrade in place.
        type: string
      latest:
        description: Latest available version
        type: string
      prerelease:
        description: Whether latest is a prerelease
        type: boolean
      source:
        description: '"cached" or "fresh"'
        type: string
      update_available:
        description: Whether an update is available
        type: boolean
      upgrade_instructions:
        description: |-
          UpgradeInstructions carries environment-specific guidance verbatim (e.g.
          the `docker pull` command for docker, the releases URL for desktop, the
          `javinizer upgrade` command for cli) so the frontend doesn't have to
          hardcode the image ref or rebuild steps per environment.
        type: string
    type: object
host: localhost:8765
info:
  contact:
    name: API Support
    url: https://github.com/javinizer/javinizer-go/issues
  description: REST API for JAV metadata scraping and file organization
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/javinizer/javinizer-go
  title: Javinizer API
  version: "1.0"
paths:
  /api/v1/actresses:
    get:
      description: Get a paginated list of actresses with optional search query and
        sorting
      parameters:
      - description: Search query
        in: query
        name: q
        type: string
      - default: name
        description: Sort column (id, dmm_id, japanese_name, first_name, last_name,
          created_at, updated_at, name)
        in: query
        name: sort_by
        type: string
      - default: asc
        description: Sort direction (asc, desc)
        in: query
        name: sort_order
        type: string
      - default: 50
        description: Max results
        in: query
        name: limit
        type: integer
      - default: 0
        description: Skip results
        in: query
        name: offset
        type: integer
      - description: Language code to include translations for (e.g., 'en')
        in: query
        name: include_translations
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_actress.actressesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
      summary: List actresses
      tags:
      - actress
    post:
      consumes:
      - application/json
      description: Create a new actress record with the provided details
      parameters:
      - description: models.Actress details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_actress.actressRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_models.Actress'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
      summary: Create actress
      tags:
      - actress
  /api/v1/actresses/{id}:
    delete:
      description: Delete an actress record by ID
      parameters:
      - description: models.Actress ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
      summary: Delete actress
      tags:
      - actress
    get:
      description: Retrieve a single actress by their database ID
      parameters:
      - description: models.Actress ID
        in: path
        name: id
        required: true
        type: integer
      - description: Language code to include translations for (e.g., 'en')
        in: query
        name: include_translations
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_models.Actress'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
      summary: Get actress by ID
      tags:
      - actress
    put:
      consumes:
      - application/json
      description: Update an existing actress record by ID
      parameters:
      - description: models.Actress ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated actress details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_actress.actressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_models.Actress'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
      summary: Update actress
      tags:
      - actress
  /api/v1/actresses/alias-group:
    get:
      description: Resolve a name to its full set of known names (canonical plus all
        aliases that resolve to it). Returns empty canonical/names when the name is
        unknown to the alias table.
      parameters:
      - description: Actress name (alias or canonical) to resolve
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
