  /api/v1/actresses/merge/preview:
    post:
      consumes:
      - application/json
      description: Build a merge preview and field conflict set for target/source
        actress IDs.
      parameters:
      - description: Merge preview request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ActressMergePreviewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ActressMergePreviewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_javinizer_javinizer-go_internal_api_contracts.ErrorResponse'
      summary: Preview actress merge
      tags:
      - actress
  /api/v1/actresses/search:
    get:
      description: Search for actresses by name (first, last, or Japanese)
