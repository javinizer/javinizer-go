# Mockery v3 configuration for javinizer-go
# Generates type-safe mocks for all repository and client interfaces
# Usage: make mocks

packages:
  # Repository interfaces (8 total) from internal/database/
  github.com/javinizer/javinizer-go/internal/database:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      MovieRepositoryInterface:
      ActressRepositoryInterface:
      GenreReplacementRepositoryInterface:
      HistoryRepositoryInterface:
      BatchFileOperationRepositoryInterface:
      EventRepositoryInterface:
      MovieTagRepositoryInterface:
      ActressAliasRepositoryInterface:
      ContentIDMappingRepositoryInterface:
      GenreTranslationRepositoryInterface:
      ActressTranslationRepositoryInterface:
      JobRepositoryInterface:
      ApiTokenRepositoryInterface:
      WordReplacementRepositoryInterface:
      GenreRepositoryInterface:

  # HTTP client interface from internal/httpclient
  github.com/javinizer/javinizer-go/internal/httpclient:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      HTTPClient:

  # Scraper interface from internal/models
  github.com/javinizer/javinizer-go/internal/models:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      Scraper:
      URLHandler:
      DownloadProxyResolver:

  # Aggregator interface from internal/aggregator
  github.com/javinizer/javinizer-go/internal/aggregator:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      AggregatorInterface:

  # ScraperInterface from internal/scrape
  github.com/javinizer/javinizer-go/internal/scrape:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      ScraperInterface:

  # WorkflowInterface from internal/workflow
  # NOTE: Separate directory to avoid import cycle:
  #   downloader_test → internal/mocks → workflow → downloader
  github.com/javinizer/javinizer-go/internal/workflow:
    config:
      dir: "internal/mocks/workflow"
      filename: "{{.InterfaceName}}.go"
      pkgname: "workflowmocks"
    interfaces:
      WorkflowInterface:

  # EventEmitter interface from internal/eventlog
  github.com/javinizer/javinizer-go/internal/eventlog:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      EventEmitter:

  # EditableJob and ControlledJob from internal/worker (per ADR-0032)
  # NOTE: Separate directory to avoid import cycle with API tests
  github.com/javinizer/javinizer-go/internal/worker:
    config:
      dir: "internal/mocks/worker"
      filename: "{{.InterfaceName}}.go"
      pkgname: "workermocks"
    interfaces:
      EditableJob:
      ControlledJob:
      BatchJobInterface: