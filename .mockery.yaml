# Mockery v3 configuration for javinizer-go
# Generates type-safe mocks for all repository and client interfaces
# Usage: make mocks

packages:
  # Repository interfaces (8 total) from internal/database/
  github.com/javinizer/javinizer-go/internal/database:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      MovieRepositoryInterface:
      ActressRepositoryInterface:
      GenreReplacementRepositoryInterface:
      HistoryRepositoryInterface:
      BatchFileOperationRepositoryInterface:
      EventRepositoryInterface:
      MovieTagRepositoryInterface:
      ActressAliasRepositoryInterface:
      ContentIDMappingRepositoryInterface:
      MovieTranslationRepositoryInterface:
      JobRepositoryInterface:

  # HTTP client interface from internal/httpclient
  github.com/javinizer/javinizer-go/internal/httpclient:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      HTTPClient:

  # Scraper interface from internal/models
  github.com/javinizer/javinizer-go/internal/models:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      Scraper:

  # Aggregator interface from internal/aggregator
  github.com/javinizer/javinizer-go/internal/aggregator:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      AggregatorInterface:

  # EventEmitter interface from internal/eventlog
  github.com/javinizer/javinizer-go/internal/eventlog:
    config:
      dir: "internal/mocks"
      filename: "{{.InterfaceName}}.go"
      pkgname: "mocks"
    interfaces:
      EventEmitter: