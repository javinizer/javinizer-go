# CodeRabbit configuration for the architecture-overhaul PR.
#
# This PR touches ~1590 files (full codebase refactor + Windows CI fixes +
# review fixes). CodeRabbit's free/pro limit is 150 files per review, so
# test files, generated code, mocks, and bulky non-source files are excluded
# to keep production source in scope.
#
# Reviewed (in scope):
#   - internal/worker/      — job store, batch job, controller, apply/rescrape phases
#   - internal/api/         — batch/core/system handlers, config narrowing, bootstrap
#   - internal/workflow/    — unified Workflow seam, compare_diff, factory
#   - internal/websocket/   — WS progress broadcast hub
#   - web/frontend/         — SvelteKit SPA: WS-driven progress bars, organize/rescrape
#   - .github/workflows/    — CI/release workflows (SHA-pinned, cache-poisoning hardening)
#   - docs/                 — development docs
#
# Excluded from review (but still in the diff):
#   - All *_test.go files
#   - All frontend test files (*.test.ts, *.spec.ts, web/frontend/tests/** e2e+fullstack)
#   - internal/mocks/** (generated by mockery)
#   - docs/swagger/** (generated by swaggo)
#   - Lockfiles, package.json, generated config blobs

reviews:
  path_filters:
    # --- Exclude all test files ---
    - "!**/*_test.go"

    # --- Exclude generated code ---
    - "!internal/mocks/**"
    - "!docs/swagger/**"

    # --- Exclude frontend test files (parity with Go *_test.go above) ---
    #     Frontend SOURCE stays in scope.
    - "!**/*.test.ts"
    - "!**/*.test.tsx"
    - "!**/*.spec.ts"
    - "!**/*.spec.tsx"
    - "!web/frontend/tests/**"

    # --- Exclude bulky/generated non-source files ---
    - "!.gitignore"
    - "!.golangci.yml"
    - "!.mockery.yaml"
    - "!**/*.sum"
    - "!**/*.lock"
    - "!**/package.json"
    - "!**/package-lock.json"

  path_instructions:
    - path: "internal/worker/job_store_persist.go"
      instructions: >
        Focus on wireJobDeps and reconstructBatchJob — these are the job
        reconstruction paths after server restart. Verify that MovieRepo,
        BatchCfg, PosterGen, and Matcher are properly restored so that
        post-restart apply/rescrape and movie-edit persistence work correctly.
    - path: "internal/worker/job_store.go"
      instructions: >
        Focus on SetReconstructionDeps — this re-hydrates infrastructure
        dependencies on jobs loaded from the database at startup, after
        the BatchJobFactory is built. Verify thread-safety of the
        re-hydration loop.
    - path: "internal/worker/apply_phase.go"
      instructions: >
        Focus on applyFile's named return + withFileRecovery(rc, &outcome)
        deferred recovery — a recovered panic must propagate Failed/Panic to
        the caller (trackApplyResults), never silently mark a file organized.
    - path: "internal/worker/batch_job.go"
      instructions: >
        isJobTransitioned excludes Completed/Organized (valid rescrape sources).
        excludeFile only cancels Pending/Running jobs — never clobber a
        terminal-success (Completed/Organized) job when its last file is excluded.
    - path: "internal/api/system/config.go"
      instructions: >
        HashProxyConfig errors must fail closed (return error) at both the
        validation path and the ConfigUpdateMu save flow — never discard a
        hash failure, or a token can be validated against the wrong proxy hash.
    - path: "internal/api/system/translation.go"
      instructions: >
        DeepL base_url must be validated (valid http(s) URL) before forwarding to
        fetchDeepLUsage, mirroring getTranslationModels — reject with 400 to avoid
        502 misclassification and SSRF.
    - path: "internal/api/system/proxy.go"
      instructions: >
        Focus on the verification token scope — direct proxy tests should
        issue tokens with scope "global" (not "direct") so they can be
        validated by config-save validation.
    - path: "internal/api/core/runtime_manager.go"
      instructions: >
        Focus on buildBatchJobFactory — verify that SetReconstructionDeps
        is called after the factory dependencies are available, ensuring
        reconstructed jobs get the correct BatchCfg/PosterGen/Matcher.
    - path: "internal/api/core/config_narrowing.go"
      instructions: >
        APIConfig must surface download-proxy profiles (cfg.Output.Download.
        DownloadProxy) so scrapers.go can offer download_proxy.profile choices.
        Keep the Config-bridge reads comment + bridges_doc.go reverse index in sync.
    - path: "internal/workflow/compare_diff.go"
      instructions: >
        release_date must compare date-only formatted values (formatTimePtr),
        not raw time.Time, to avoid timezone/time-of-day false mismatches.

review_status:
  fail_commit_in_status: false
  convey_status: false
