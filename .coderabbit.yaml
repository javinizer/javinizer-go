  path_instructions:
    - path: "internal/workflow/**"
      instructions: >
        This package implements the unified Workflow seam that replaced ad-hoc task types. Review for: (a) no reintroduction of old TaskType-specific dispatch branches, (b) orchestrator error propagation — errors must not be swallowed or silently downgraded, (c) context cancellation honored through every phase, (d) no data loss between scrape/aggregate/organize phases regardless of which interface (CLI/TUI/API) initiated the operation.
    - path: "internal/worker/**"
      instructions: >
        Worker pool executes Tasks concurrently under a semaphore. Review for: panic recovery in executeTask (no goroutine crash leaks), bounded concurrency (no unbounded goroutine spawning), ProgressTracker broadcast thread-safety under concurrent updates, and job lifecycle consistency (no progress events after completion).
    - path: "internal/config/**"
      instructions: >
        Config loading, env overrides, validation, proxy/download profile normalization. Review for: env var overrides applied with the documented precedence (CLI flag > env > config file), validation fails closed on invalid combinations (returns error, never silently coerces), and proxy Profile/DefaultProfile normalization applied consistently (mirror the api/system/config.go normalize-before-compare fix).
    - path: "cmd/javinizer/**"
      instructions: >
        CLI command wiring via cobra. Review for: Dependencies/DependenciesInterface injection for testability, context propagation from root command into all subcommands, and no direct global-state mutation bypassing the config layer.

review_status:
  fail_commit_in_status: false
  convey_status: false
