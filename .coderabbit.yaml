    - "!internal/api/**"
    - "!internal/challengedetect/**"
    - "!internal/commandutil/**"
    - "!internal/config/**"
    - "!internal/configutil/**"
    - "!internal/coverage/**"
    - "!internal/e2e_test.go/**"
