    - "!.mockery.yaml"
    - "!**/*.sum"
    - "!**/*.lock"
    - "!**/package.json"
    - "!**/package-lock.json"

    # --- Exclude everything NOT in this pass's scope (data+processing (internal/{database,organizer,downloader,nfo,template,translation,history,aggregator,matcher,scanner,eventlog,fsutil,imageutil,poster,mediainfo,formatter}) (122 files)) ---
    - "!.github/**"
