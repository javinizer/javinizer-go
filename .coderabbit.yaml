# CodeRabbit configuration — CHUNKED FULL REVIEW (temporary per-pass scope).
#
# PASS 1 scope — internal/api only (137 files).
# This is one pass of a 5-pass chunked full review (PR #35 touches 607 reviewable
# files; CodeRabbit's per-review limit is 150). Each pass toggles this config to
# a disjoint slice, pushes, and invokes `@coderabbitai full review` to bypass the
# incremental cache. After all 5 passes land, this file is restored to full scope.
#
# Passes (disjoint, union = all 607 reviewable files):
#   1. internal/api (137)
#   2. orchestration+config: worker/workflow/websocket/config + cmd/.github/docs/root (121)
#   3. scrapers+scrape-infra (111)
#   4. data+processing (128)
#   5. frontend+tui+utils (110)

reviews:
  path_filters:
    # --- In-scope for THIS pass (positive includes) ---
    - "internal/api/**"

    # --- Permanent excludes (tests, generated, lockfiles) ---
    - "!**/*_test.go"
    - "!internal/mocks/**"
    - "!docs/swagger/**"
    - "!**/*.test.ts"
    - "!**/*.test.tsx"
    - "!**/*.spec.ts"
    - "!**/*.spec.tsx"
    - "!web/frontend/tests/**"
    - "!.gitignore"
    - "!.golangci.yml"
    - "!.mockery.yaml"
    - "!**/*.sum"
    - "!**/*.lock"
    - "!**/package.json"
    - "!**/package-lock.json"

  path_instructions:
    - path: "internal/worker/job_store_persist.go"
      instructions: >
        Focus on wireJobDeps and reconstructBatchJob — job reconstruction paths
        after server restart. Verify MovieRepo/BatchCfg/PosterGen/Matcher are restored
        so post-restart apply/rescrape and movie-edit persistence work correctly.
    - path: "internal/worker/apply_phase.go"
      instructions: >
        applyFile uses a named return + withFileRecovery(rc, &outcome) deferred
        recovery — a recovered panic must propagate Failed/Panic to the caller,
        never silently mark a file organized.
    - path: "internal/worker/batch_job.go"
      instructions: >
        isJobTransitioned excludes Completed/Organized (valid rescrape sources).
        excludeFile only cancels Pending/Running jobs — never clobber a terminal-
        success job when its last file is excluded.
    - path: "internal/api/system/config.go"
      instructions: >
        HashProxyConfig errors must fail closed (return error) at both the validation
        path and the ConfigUpdateMu save flow — never discard a hash failure.
    - path: "internal/api/system/translation.go"
      instructions: >
        DeepL base_url must be validated (valid http(s) URL) before forwarding to
        fetchDeepLUsage, mirroring getTranslationModels — reject with 400.
    - path: "internal/api/core/config_narrowing.go"
      instructions: >
        APIConfig surfaces download-proxy profiles. Keep the Config-bridge reads
        comment + bridges_doc.go reverse index in sync.

review_status:
  fail_commit_in_status: false
  convey_status: false
