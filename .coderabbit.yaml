  path_instructions:
    - path: "internal/api/system/config.go"
      instructions: >
        HashProxyConfig errors must fail closed (return error) at both the validation path and the ConfigUpdateMu save flow — never discard a hash failure.
    - path: "internal/api/system/translation.go"
      instructions: >
        DeepL base_url must be validated (valid http(s) URL) before forwarding to fetchDeepLUsage, mirroring getTranslationModels — reject with 400.
    - path: "internal/api/core/config_narrowing.go"
      instructions: >
        APIConfig surfaces download-proxy profiles. Keep the Config-bridge reads comment + bridges_doc.go reverse index in sync.
    - path: "internal/api/batch/rescrape.go"
      instructions: >
        rescrape uses result.Movie.ID (authoritative) over stale FileMatchInfo ID. Swagger annotations include 409/422.
    - path: "internal/api/batch/usecases.go"
      instructions: >
        pagination normalizes Offset/Limit non-negative before slicing. FileMatchInfo propagated into ScrapePhaseConfig.

