    - "!internal/mocks/**"
    - "!docs/swagger/**"
    - "!**/*.test.ts"
    - "!**/*.test.tsx"
    - "!**/*.spec.ts"
    - "!**/*.spec.tsx"
    - "!web/frontend/tests/**"
    - "!.gitignore"
    - "!.golangci.yml"
    - "!.mockery.yaml"
    - "!**/*.sum"
    - "!**/*.lock"
    - "!**/package.json"
    - "!**/package-lock.json"

    # --- Exclude everything NOT in this pass's scope (scrapers + scrape-infra (internal/scraper,scraperconfig,scraperutil,scrape,ssrf,httpclient,ratelimit,challengedetect) (91 files)) ---
    - "!.github/**"
    - "!cmd/**"
    - "!configs/**"
    - "!docs/**"
    - "!internal/aggregator/**"
    - "!internal/api/**"
    - "!internal/commandutil/**"
    - "!internal/config/**"
    - "!internal/configutil/**"
    - "!internal/coverage/**"
    - "!internal/database/**"
    - "!internal/downloader/**"
    - "!internal/e2e_test.go/**"
    - "!internal/enumutil/**"
    - "!internal/eventlog/**"
    - "!internal/formatter/**"
    - "!internal/fsutil/**"
    - "!internal/history/**"
    - "!internal/imageutil/**"
    - "!internal/logging/**"
    - "!internal/matcher/**"
    - "!internal/mediainfo/**"
    - "!internal/mocks/**"
    - "!internal/models/**"
    - "!internal/nfo/**"
    - "!internal/operationmode/**"
    - "!internal/organizer/**"
    - "!internal/panicutil/**"
    - "!internal/poster/**"
    - "!internal/scanner/**"
    - "!internal/template/**"
    - "!internal/testutil/**"
    - "!internal/translation/**"
    - "!internal/tui/**"
    - "!internal/update/**"
    - "!internal/version/**"
    - "!internal/websocket/**"
    - "!internal/worker/**"
    - "!internal/workflow/**"
    - "!scripts/**"
    - "!web/frontend/**"
    - "!.coderabbit.yaml"
    - "!.gitignore"
    - "!.golangci.yml"
    - "!.mockery.yaml"
    - "!Makefile"
    - "!go.mod"
    - "!go.sum"

  path_instructions:
    - path: "internal/scraper/**"
      instructions: >
        Per-source metadata scrapers. Review for: (a) SafeSearch/panic recovery — a panicking scraper must never crash the worker pool, (b) HTTP errors classified via scraperErrorKind (no raw error leakage), (c) no SSRF — outbound URLs constrained to the source's allowed hosts (internal/ssrf), (d) no unbounded memory on large pages (bound DOM parsing), (e) scraper module init() registration is side-effect-free and thread-safe.
    - path: "internal/scrape/**"
      instructions: >
        Scrape orchestration infrastructure (ScrapeCmd, per-file dispatch). Review for: context cancellation honored through every HTTP call, rate limiting applied per source, and no data loss when a scraper returns partial results.
    - path: "internal/ssrf/**"
      instructions: >
        SSRF protection. Review for: private/loopback/link-local address rejection, DNS rebinding (resolve then re-check the resolved IP), and that no scraper can reach file:// or metadata endpoints.
    - path: "internal/httpclient/**"
      instructions: >
        Shared HTTP client (resty wrapper). Review for: timeout enforcement on both dial and read, redirect policy (no cross-host redirect following without SSRF re-check), and referer/UA resolution consistency.

review_status:
  fail_commit_in_status: false
  convey_status: false
