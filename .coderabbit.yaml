# CodeRabbit configuration — CHUNKED FULL REVIEW (temporary per-pass scope).
#
# PASS 3 scope — scrapers + scrape-infra (internal/scraper,scraperconfig,scraperutil,scrape,ssrf,httpclient,ratelimit,challengedetect) (91 files)
# One pass of a 5-pass chunked full review (PR #35 = 607 reviewable files; limit 150).
# In-scope = everything NOT excluded below. After all 5 passes, restored to full scope.
#
# Passes (disjoint, union = all 607 reviewable files):
#   1. internal/api (137)
#   2. orchestration+config: worker/workflow/websocket/config + cmd/.github/docs/root (121)
#   3. scrapers+scrape-infra (111)
#   4. data+processing (128)
#   5. frontend+tui+utils (110)

reviews:
  path_filters:
    # --- Permanent excludes (tests, generated, lockfiles) ---
