# CodeRabbit configuration for the architecture-overhaul PR.
#
# This PR touches 1500+ files (full codebase refactor + Windows CI fixes +
# Copilot review fixes). CodeRabbit's free/pro limit is 150 files per review.
# These path_filters exclude test files, generated code, mocks, and
# non-critical packages so the review focuses on the architecturally
# significant production code. Use incremental `@coderabbitai review`
# (reviews only unreviewed commits) to stay within the file limit; a full
# review of the entire 1590-file diff is not feasible.
#
# Reviewed (kept in scope):
#   - internal/worker/      — job store, batch job, controller (Findings 2 & 3)
#   - internal/api/system/  — proxy token scope fix (Finding 1)
#   - internal/api/core/    — runtime manager wiring (Finding 3)
#   - internal/api/batch/   — batch handlers (apply/rescrape paths)
#   - internal/workflow/    — unified Workflow seam
#   - internal/websocket/   — WS progress broadcast hub (progress-bar feature)
#   - web/frontend/         — SvelteKit SPA: WS-driven progress bars + organize
#                             controller (monotonic/verbose progress feature)
#
# Excluded from review (but still in the diff):
#   - All *_test.go files
#   - internal/mocks/** (generated by mockery)
#   - docs/swagger/** (generated by swaggo)
#   - internal/tui, internal/scraper/*, internal/config, internal/database,
#     internal/models, internal/nfo, internal/organizer, etc.

reviews:
  path_filters:
    # --- Exclude all test files ---
    - "!**/*_test.go"

    # --- Exclude generated code ---
    - "!internal/mocks/**"
    - "!docs/swagger/**"

    # --- Frontend is IN scope (WS-driven progress-bar feature) ---

    # --- Exclude non-critical packages (focus on worker/api/workflow) ---
    - "!cmd/**"
    - "!internal/tui/**"
    - "!internal/scraper/**"
    - "!internal/translation/**"
    - "!internal/mediainfo/**"
    - "!internal/config/**"
    - "!internal/configutil/**"
    - "!internal/database/**"
    - "!internal/models/**"
    - "!internal/nfo/**"
    - "!internal/organizer/**"
    - "!internal/template/**"
    - "!internal/matcher/**"
    - "!internal/downloader/**"
    - "!internal/httpclient/**"
    - "!internal/scanner/**"
    - "!internal/scrape/**"
    - "!internal/poster/**"
    - "!internal/history/**"
    - "!internal/logging/**"
    - "!internal/update/**"
    - "!internal/ssrf/**"
    - "!internal/ratelimit/**"
    - "!internal/imageutil/**"
    - "!internal/formatter/**"
    - "!internal/fsutil/**"
    - "!internal/panicutil/**"
    - "!internal/eventlog/**"
    - "!internal/coverage/**"
    - "!internal/enumutil/**"
    - "!internal/operationmode/**"
    # internal/websocket/ is IN scope (WS progress broadcast hub)
    - "!internal/version/**"
    - "!internal/scraperutil/**"
    - "!internal/scraperconfig/**"
    - "!internal/testutil/**"
    - "!internal/aggregator/**"
    - "!internal/commandutil/**"

    # --- Exclude non-critical API sub-packages ---
    - "!internal/api/actress/**"
    - "!internal/api/auth/**"
    - "!internal/api/contracts/**"
    - "!internal/api/events/**"
    - "!internal/api/file/**"
    - "!internal/api/genre/**"
    - "!internal/api/history/**"
    - "!internal/api/jobs/**"
    - "!internal/api/middleware/**"
    - "!internal/api/movie/**"
    - "!internal/api/realtime/**"
    - "!internal/api/server/**"
    - "!internal/api/temp/**"
    - "!internal/api/testkit/**"
    - "!internal/api/token/**"
    - "!internal/api/version/**"
    - "!internal/api/apperrors/**"

    # --- Exclude non-Go config files ---
    - "!.gitignore"
    - "!.golangci.yml"
    - "!.mockery.yaml"
    - "!**/*.sum"
    - "!**/*.lock"
    - "!**/package.json"
    - "!**/package-lock.json"

  path_instructions:
    - path: "internal/worker/job_store_persist.go"
      instructions: >
        Focus on wireJobDeps and reconstructBatchJob — these are the job
        reconstruction paths after server restart. Verify that MovieRepo,
        BatchCfg, PosterGen, and Matcher are properly restored so that
        post-restart apply/rescrape and movie-edit persistence work correctly.
    - path: "internal/worker/job_store.go"
      instructions: >
        Focus on SetReconstructionDeps — this re-hydrates infrastructure
        dependencies on jobs loaded from the database at startup, after
        the BatchJobFactory is built. Verify thread-safety of the
        re-hydration loop.
    - path: "internal/api/system/proxy.go"
      instructions: >
        Focus on the verification token scope — direct proxy tests should
        issue tokens with scope "global" (not "direct") so they can be
        validated by config-save validation.
    - path: "internal/api/core/runtime_manager.go"
      instructions: >
        Focus on buildBatchJobFactory — verify that SetReconstructionDeps
        is called after the factory dependencies are available, ensuring
        reconstructed jobs get the correct BatchCfg/PosterGen/Matcher.

review_status:
  fail_commit_in_status: false
  convey_status: false
