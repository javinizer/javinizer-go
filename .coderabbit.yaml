    - "!internal/panicutil/**"
    - "!internal/ratelimit/**"
    - "!internal/scrape/**"
    - "!internal/scraper/**"
    - "!internal/scraperconfig/**"
    - "!internal/scraperutil/**"
    - "!internal/ssrf/**"
    - "!internal/testutil/**"
    - "!internal/tui/**"
    - "!internal/update/**"
    - "!internal/version/**"
    - "!internal/websocket/**"
    - "!internal/worker/**"
    - "!internal/workflow/**"
    - "!scripts/**"
    - "!web/frontend/**"
    - "!.coderabbit.yaml"
    - "!.gitignore"
