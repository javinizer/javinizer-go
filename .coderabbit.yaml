  path_instructions:
    - path: "internal/database/**"
      instructions: >
        Focus: GORM repository correctness (transactions, scope of auto-migrate, nil-safe dereferences), SQL injection / raw-query safety, transaction rollback on error, repository interface contracts vs implementations. Flag any error that is swallowed or not wrapped with %w.
    - path: "internal/organizer/**"
      instructions: >
        Focus: afero filesystem operations (atomic moves, temp-dir cleanup, path traversal outside the library root), template-method strategy correctness, no silent data loss on rename/move failures. Flag missing error checks on fs operations.
    - path: "internal/downloader/**"
      instructions: >
        Focus: media download integrity (cover/trailer/art), SSRF on download URLs constrained to allowed media hosts, file-handle/HTTP-body Close on all paths, context cancellation honored, no partial-file left on failure.
    - path: "internal/nfo/**"
      instructions: >
        Focus: NFO XML generation correctness (escaping, encoding, well-formed output), no metadata truncation, Kodi/Plex schema conformance. Flag any unescaped user/metadata value written to XML.
    - path: "internal/template/**"
      instructions: >
        Focus: template engine correctness (binding injection, missing-key handling, no panic on nil fields), output determinism. Flag unbounded recursion or unescaped path separators in rendered filenames.
    - path: "internal/translation/**"
      instructions: >
        Focus: translation service correctness (DeepL/Google/OpenAI adapters), API key handling redacted in logs/errors, context cancellation honored, rate limiting respected. Flag leaked credentials or raw HTTP error leakage.
    - path: "internal/history/**"
      instructions: >
        Focus: operation history persistence (idempotency, no overwrite of prior history), timestamp/timezone correctness. Flag swallowed errors on history writes.
    - path: "internal/aggregator/**"
      instructions: >
        Focus: priority-based multi-source merge correctness (no silent field overwrite by lower-priority source), deterministic merge order, nil-safe handling of partial scraper results. Flag any field dropped without logging.
    - path: "internal/matcher/**"
      instructions: >
        Focus: JAV ID extraction regex correctness (no catastrophic backtracking, no panic on malformed input), case/prefix handling determinism. Flag regex compile-in-hot-path or unbounded input consumption.
    - path: "internal/scanner/**"
      instructions: >
        Focus: filesystem video discovery (afero, no symlink/permission silent skips), extension allow-list, no traversal outside input root. Flag ignored errors on directory reads.
    - path: "internal/eventlog/**"
      instructions: >
        Focus: structured event persistence (no schema drift, no swallowed write errors), event ordering. Flag nil-event writes.
    - path: "internal/fsutil/**"
      instructions: >
        Focus: filesystem helpers (path normalization, atomic writes, temp-dir hygiene, no path traversal). Flag TOCTOU or missing Close on copied files.
    - path: "internal/imageutil/**"
      instructions: >
        Focus: image processing (decode/resize/normalize) correctness, no panic on malformed images, bounded memory (large-image guard), host allow-lists for DMM/CDN URLs. Flag unbounded image.Image allocation.
    - path: "internal/poster/**"
      instructions: >
        Focus: poster generation/assembly correctness, file-handle Close on all paths, temp-file cleanup, no silent overwrite of existing posters without intent. Flag missing error checks.
    - path: "internal/mediainfo/**"
      instructions: >
        Focus: MP4 metadata parsing correctness (mp4ff), no panic on truncated/invalid MP4, bounded reads, context cancellation. Flag swallowed parse errors or unbounded box reads.
    - path: "internal/formatter/**"
      instructions: >
        Focus: output formatting determinism, no silent truncation, encoding safety. Flag unescaped control characters in formatted output.

review_status:
  fail_commit_in_status: false
  convey_status: false
